<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML 執行器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #1e1e2e; color: #cdd6f4; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* 頂部工具列 */
  header { padding: 10px 16px; background: #181825; border-bottom: 1px solid #313244; display: flex; align-items: center; gap: 10px; }
  header h1 { font-size: 15px; font-weight: 600; color: #cba6f7; flex: 1; }
  .btn { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity .15s; }
  .btn:hover { opacity: .8; }
  .btn-run { background: #a6e3a1; color: #1e1e2e; }
  .btn-edit { background: #89b4fa; color: #1e1e2e; }
  .btn-clear { background: #313244; color: #cdd6f4; }

  /* 預覽區全屏 */
  #preview { flex: 1; border: none; background: #fff; width: 100%; }

  /* 遮罩 */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; align-items: center; justify-content: center; }
  .overlay.open { display: flex; }

  /* 編輯器彈窗 */
  .modal { background: #1e1e2e; border: 1px solid #313244; border-radius: 12px; width: min(680px, 94vw); height: min(520px, 88vh); display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.6); }
  .modal-header { padding: 12px 16px; background: #181825; border-radius: 12px 12px 0 0; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #313244; }
  .modal-header span { font-size: 14px; color: #cba6f7; font-weight: 600; }
  .modal-header small { font-size: 11px; color: #585b70; }
  .close-btn { background: #313244; border: none; color: #cdd6f4; width: 26px; height: 26px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .close-btn:hover { background: #45475a; }
  textarea { flex: 1; background: #181825; color: #cdd6f4; border: none; outline: none; padding: 14px; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.6; resize: none; }
  .modal-footer { padding: 10px 14px; background: #181825; border-radius: 0 0 12px 12px; border-top: 1px solid #313244; display: flex; gap: 8px; align-items: center; }
  #charCount { font-size: 11px; color: #585b70; margin-left: auto; }
  #status { font-size: 12px; color: #a6e3a1; min-width: 80px; }
</style>
</head>
<body>

<header>
  <h1>⚡ HTML 執行器</h1>
  <button class="btn btn-edit" onclick="openEditor()">✏️ 編輯程式碼</button>
</header>

<iframe id="preview" sandbox="allow-scripts allow-same-origin allow-modals allow-forms"></iframe>

<!-- 編輯器彈窗 -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span>📝 程式碼編輯器</span>
      <small>Ctrl+Enter 執行 &nbsp;|&nbsp; Tab 縮排</small>
      <button class="close-btn" onclick="closeEditor()">✕</button>
    </div>
    <textarea id="editor" placeholder="在這裡輸入 HTML 程式碼...

範例：
<h1 style='color:coral'>Hello!</h1>
<button onclick=&quot;alert('Hi!')&quot;>點我</button>"></textarea>
    <div class="modal-footer">
      <span id="status"></span>
      <span id="charCount">0 字元</span>
      <button class="btn btn-clear" onclick="clearCode()" style="padding:5px 12px;font-size:12px">清除</button>
      <button class="btn btn-run" onclick="runAndClose()" style="padding:5px 14px;font-size:12px">▶ 執行並關閉</button>
    </div>
  </div>
</div>

<script>
  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');
  const overlay = document.getElementById('overlay');
  const status = document.getElementById('status');
  const charCount = document.getElementById('charCount');

  editor.addEventListener('input', () => {
    charCount.textContent = editor.value.length + ' 字元';
  });

  editor.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = editor.selectionStart;
      editor.value = editor.value.substring(0, s) + '  ' + editor.value.substring(editor.selectionEnd);
      editor.selectionStart = editor.selectionEnd = s + 2;
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { run(); showStatus('✅ 執行成功'); }
    if (e.key === 'Escape') closeEditor();
  });

  function openEditor() {
    overlay.classList.add('open');
    setTimeout(() => editor.focus(), 50);
  }

  function closeEditor() { overlay.classList.remove('open'); }

  function handleOverlayClick(e) { if (e.target === overlay) closeEditor(); }

  function run() {
    const doc = preview.contentDocument || preview.contentWindow.document;
    doc.open(); doc.write(editor.value); doc.close();
    showStatus('✅ 執行成功');
  }

  function runAndClose() { run(); closeEditor(); }

  function clearAll() {
    editor.value = '';
    charCount.textContent = '0 字元';
    const doc = preview.contentDocument || preview.contentWindow.document;
    doc.open(); doc.write(''); doc.close();
  }

  function clearCode() {
    editor.value = '';
    charCount.textContent = '0 字元';
  }

  function showStatus(msg) {
    status.textContent = msg;
    setTimeout(() => status.textContent = '', 2000);
  }
</script>
</body>
</html>

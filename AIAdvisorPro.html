<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>AI全知顧問</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f4f7f6; height: 100dvh; display: flex; justify-content: center; align-items: center; }
        #chat-window { width: 100%; max-width: 420px; height: 100dvh; max-height: 700px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        @media (max-width: 480px) {
            body { align-items: stretch; }
            #chat-window { max-width: 100%; max-height: 100dvh; border-radius: 0; }
        }
        #header { background: #1a73e8; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; position: relative; }
        #clear-btn { position: absolute; right: 12px; font-size: 12px; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.5); color: white; padding: 4px 8px; border-radius: 5px; cursor: pointer; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 4px; }
        #input-group { padding: 12px 15px; display: flex; gap: 10px; background: white; border-top: 1px solid #eee; flex-shrink: 0; }
        #user-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        #send-btn { background: #1a73e8; color: white; border: none; padding: 10px 18px; border-radius: 20px; cursor: pointer; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .login-box { background: white; padding: 20px; border-radius: 10px; text-align: center; width: 550px; }
        .login-box h3 { margin-bottom: 8px; }
        .login-box p { font-size: 12px; color: #666; margin-bottom: 12px; }
        .login-box input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 10px; }
        .login-box button { width: 100%; background: #1a73e8; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
        .confirm-box { background: white; padding: 24px; border-radius: 10px; text-align: center; width: 280px; }
        .confirm-box p { margin-bottom: 16px; color: #333; }
        .confirm-btns { display: flex; gap: 10px; }
        .confirm-btns button { flex: 1; padding: 10px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-cancel { background: #eee; color: #333; }
        .btn-confirm { background: #e53935; color: white; }
    </style>
</head>
<body>

<div id="auth-overlay" class="overlay">
    <div class="login-box">
        <h3>請輸入系統授權碼</h3>
        <p>您的專屬 AI Key：<p>
        <p>Z2hwXzBlMkM5NXY2YUR3TlZPYXJxY2I1QmJYZVZBdnJ1dzFNbGFGaQ(後面加上兩個等號)</p>
        <input type="password" id="auth-key" placeholder="輸入授權碼...">
        <button onclick="startApp()">啟動 AI</button>
    </div>
</div>

<div id="confirm-overlay" class="overlay" style="display:none;">
    <div class="confirm-box">
        <p>確定要刪除對話紀錄嗎？</p>
        <div class="confirm-btns">
            <button class="btn-cancel" onclick="closeConfirm()">取消</button>
            <button class="btn-confirm" onclick="clearChat()">確定刪除</button>
        </div>
    </div>
</div>

<div id="chat-window">
    <div id="header">
        AI全知顧問
        <button id="clear-btn" onclick="showConfirm()">刪除對話</button>
    </div>
    <div id="msgs"></div>
    <div id="input-group">
        <input type="text" id="user-input" placeholder="請輸入問題...">
        <button id="send-btn" onclick="send()">發送</button>
    </div>
</div>

<script>
    const GIST_ID = "cc37ee46d77d8e0bf8fdb83940a12964";
    let USER_TOKEN = "";
    let USER_UID = "";
    let lastMsgCount = 0;

    window.onload = function() {
        const savedToken = localStorage.getItem('ai_token');
        const savedUid = localStorage.getItem('ai_uid');
        if(savedToken) {
            USER_TOKEN = savedToken;
            USER_UID = savedUid || "";
            document.getElementById('auth-overlay').style.display = 'none';
            if(USER_UID) loadHistory();
        }
    };

    function startApp() {
        const key = document.getElementById('auth-key').value;
        try {
            USER_TOKEN = atob(key.trim());
            if(!USER_TOKEN.startsWith('ghp_')) throw new Error();
            localStorage.setItem('ai_token', USER_TOKEN);
            document.getElementById('auth-overlay').style.display = 'none';
            USER_UID = localStorage.getItem('ai_uid') || "";
            if(USER_UID) loadHistory();
        } catch(e) {
            alert("授權碼錯誤或已過期");
        }
    }

    function showConfirm() {
        document.getElementById('confirm-overlay').style.display = 'flex';
    }

    function closeConfirm() {
        document.getElementById('confirm-overlay').style.display = 'none';
    }

    async function clearChat() {
        closeConfirm();

        // 通知雲端此用戶已清除對話
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: { "Authorization": `token ${USER_TOKEN}` }
            });
            const data = await res.json();
            let chats = JSON.parse(data.files["chats.json"].content || "[]");
            chats.push({ uid: USER_UID, msg: '', time: new Date().toLocaleString(), role: 'cleared' });
            await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: "PATCH",
                headers: { "Authorization": `token ${USER_TOKEN}` },
                body: JSON.stringify({ files: { "chats.json": { content: JSON.stringify(chats) } } })
            });
        } catch(e) { console.log("通知失敗", e); }

        // 產生新 uid
        const oldSeq = USER_UID.slice(4);
        const newRand = Math.floor(1000 + Math.random() * 9000).toString();
        USER_UID = newRand + oldSeq;
        localStorage.setItem('ai_uid', USER_UID);
        lastMsgCount = 0;
        document.getElementById('msgs').innerHTML = '';
    }

    async function generateUid() {
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: { "Authorization": `token ${USER_TOKEN}` }
            });
            const data = await res.json();
            let chats = JSON.parse(data.files["chats.json"].content || "[]");
            const existingUids = [...new Set(chats.map(c => c.uid).filter(Boolean))];
            const seq = (existingUids.length + 1).toString().padStart(3, '0');
            const rand = Math.floor(1000 + Math.random() * 9000).toString();
            return rand + seq;
        } catch(e) {
            return Math.floor(1000 + Math.random() * 9000).toString() + '001';
        }
    }

    async function loadHistory() {
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: { "Authorization": `token ${USER_TOKEN}` }
            });
            const data = await res.json();
            let chats = JSON.parse(data.files["chats.json"].content || "[]");
            const myChats = chats.filter(c => c.uid === USER_UID);

            if(myChats.length === lastMsgCount) return;
            lastMsgCount = myChats.length;

            const msgs = document.getElementById('msgs');
            msgs.innerHTML = '';
            myChats.forEach(c => appendMsg(c.msg, c.role, c.time));

            // 標記最後一則 admin 訊息為已讀
            let changed = false;
            for(let i = chats.length - 1; i >= 0; i--) {
                if(chats[i].uid === USER_UID && chats[i].role === 'admin' && !chats[i].read) {
                    chats[i].read = true;
                    changed = true;
                    break;
                }
            }
            if(changed) {
                await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    method: "PATCH",
                    headers: { "Authorization": `token ${USER_TOKEN}` },
                    body: JSON.stringify({ files: { "chats.json": { content: JSON.stringify(chats) } } })
                });
            }
        } catch(e) {
            console.log("載入失敗", e);
        }
    }

    async function send() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if(!text) return;

        appendMsg(text, 'user', new Date().toLocaleString());
        input.value = "";
        input.disabled = true;

        try {
            if(!USER_UID) {
                USER_UID = await generateUid();
                localStorage.setItem('ai_uid', USER_UID);
            }

            const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: { "Authorization": `token ${USER_TOKEN}` }
            });
            const data = await res.json();
            let chats = JSON.parse(data.files["chats.json"].content || "[]");

            chats.push({ uid: USER_UID, msg: text, time: new Date().toLocaleString(), role: 'user' });

            await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: "PATCH",
                headers: { "Authorization": `token ${USER_TOKEN}` },
                body: JSON.stringify({ files: { "chats.json": { content: JSON.stringify(chats) } } })
            });

            lastMsgCount++;
            input.disabled = false;
        } catch(e) {
            alert("連線中斷，請重新檢查授權碼");
            localStorage.removeItem('ai_token');
            location.reload();
        }
    }

    function appendMsg(t, r, time) {
        const d = document.createElement('div');
        d.style.textAlign = r === 'user' ? 'right' : 'left';
        d.innerHTML = `
            <p style="display:inline-block; padding:8px 12px; background:${r === 'admin' ? '#d0e8ff' : '#dcf8c6'}; border-radius:12px; max-width:75%; word-break:break-word;">${t}</p>
            ${time ? `<div style="font-size:10px; color:#aaa; margin-bottom:4px;">${time}</div>` : ''}
        `;
        const msgs = document.getElementById('msgs');
        msgs.appendChild(d);
        msgs.scrollTop = msgs.scrollHeight;
    }

    setInterval(() => { if(USER_UID) loadHistory(); }, 5000);

    document.getElementById('user-input').addEventListener('keydown', e => {
        if(e.key === 'Enter') send();
    });
</script>
</body>
</html>

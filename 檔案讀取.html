<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>檔案檢視器</title>
<!-- 原有函式庫 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- 新增: PDF.js 函式庫 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  // 設定 PDF.js worker
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }

  #toolbar {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px; background: #1e293b;
    border-bottom: 1px solid #334155; flex-shrink: 0; flex-wrap: wrap;
  }
  #toolbar h1 { font-size: 16px; font-weight: 600; color: #94a3b8; margin-right: auto; }
  #file-label {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px; background: #3b82f6; color: white;
    border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: background 0.2s;
  }
  #file-label:hover { background: #2563eb; }
  #file-input { display: none; }
  #file-name { font-size: 13px; color: #64748b; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #clear-btn {
    padding: 8px 14px; background: #ef4444; color: white;
    border: none; border-radius: 8px; cursor: pointer; font-size: 13px; display: none; transition: background 0.2s;
  }
  #clear-btn:hover { background: #dc2626; }
  #save-btn {
    padding: 8px 14px; background: #22c55e; color: white;
    border: none; border-radius: 8px; cursor: pointer; font-size: 13px; display: none; transition: background 0.2s;
  }
  #save-btn:hover { background: #16a34a; }
  #type-badge {
    padding: 3px 10px; border-radius: 99px; font-size: 12px;
    font-weight: 700; display: none; letter-spacing: 0.05em;
  }
  .badge-html    { background: #f97316; color: white; }
  .badge-svg     { background: #a855f7; color: white; }
  .badge-txt     { background: #22c55e; color: white; }
  .badge-docx    { background: #2563eb; color: white; }
  .badge-xlsx    { background: #16a34a; color: white; }
  .badge-pdf     { background: #dc2626; color: white; } /* 新增 PDF 徽章顏色 */
  .badge-special { background: #f59e0b; color: white; }

  #preview-area { flex: 1; position: relative; overflow: hidden; }

  #preview-frame { width: 100%; height: 100%; border: none; background: white; display: none; }

  #svg-container { width: 100%; height: 100%; display: none; background: white; overflow: auto; }

  /* PDF Container - 新增 */
  #pdf-container { 
    width: 100%; height: 100%; display: none; 
    background: #525659; overflow: auto; 
    display: none; flex-direction: column; align-items: center; 
    padding: 20px; gap: 20px;
  }
  .pdf-page-canvas {
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    max-width: 100%;
    height: auto !important;
  }

  /* TXT / special — editable */
  #txt-container { width: 100%; height: 100%; display: none; overflow: hidden; background: #0f172a; display: none; flex-direction: column; }
  #txt-toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: #1e293b; border-bottom: 1px solid #334155; font-size: 12px; color: #64748b; flex-shrink: 0; }
  #txt-edit-toggle {
    padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
    background: #334155; color: #94a3b8; border: none; transition: all 0.15s;
  }
  #txt-edit-toggle.active { background: #f59e0b; color: white; }
  #txt-content {
    flex: 1; font-family: 'Consolas','Courier New',monospace; font-size: 14px;
    line-height: 1.7; color: #cbd5e1; white-space: pre-wrap; word-break: break-word;
    padding: 24px; overflow: auto; background: transparent; border: none; outline: none; resize: none;
  }
  #txt-content[contenteditable="true"] { background: #0a0f1a; caret-color: #3b82f6; }
  #txt-content[contenteditable="true"]:focus { outline: none; }

  /* DOCX */
  #docx-container { width: 100%; height: 100%; display: none; overflow: auto; background: #f8fafc; padding: 40px 20px; }
  #docx-content {
    max-width: 820px; margin: 0 auto; background: white;
    padding: 60px 72px; box-shadow: 0 4px 32px rgba(0,0,0,0.12);
    border-radius: 4px; color: #1e293b; font-size: 15px; line-height: 1.8;
  }
  #docx-content h1,#docx-content h2,#docx-content h3 { margin: 1em 0 0.4em; }
  #docx-content p { margin-bottom: 0.8em; }
  #docx-content table { border-collapse: collapse; width: 100%; margin: 1em 0; }
  #docx-content td,#docx-content th { border: 1px solid #cbd5e1; padding: 6px 10px; }

  /* XLSX */
  #xlsx-container { width: 100%; height: 100%; display: none; overflow: auto; background: #0f172a; }
  #sheet-tabs { display: flex; gap: 2px; padding: 10px 16px 0; background: #1e293b; border-bottom: 1px solid #334155; flex-shrink: 0; flex-wrap: wrap; }
  .sheet-tab { padding: 6px 16px; border-radius: 6px 6px 0 0; font-size: 13px; cursor: pointer; background: #334155; color: #94a3b8; border: none; transition: all 0.15s; }
  .sheet-tab.active { background: #3b82f6; color: white; }
  .sheet-tab:hover:not(.active) { background: #475569; color: #e2e8f0; }
  #xlsx-table-wrap { overflow: auto; padding: 16px; height: calc(100% - 44px); }
  #xlsx-table-wrap table { border-collapse: collapse; font-size: 13px; white-space: nowrap; }
  #xlsx-table-wrap th { background: #1e293b; color: #94a3b8; padding: 6px 14px; border: 1px solid #334155; font-weight: 600; position: sticky; top: 0; z-index: 1; }
  #xlsx-table-wrap td { padding: 5px 14px; border: 1px solid #1e293b; color: #cbd5e1; background: #0f172a; }
  #xlsx-table-wrap tr:nth-child(even) td { background: #111827; }
  #xlsx-table-wrap tr:hover td { background: #1e293b; }

  /* Drop zone */
  #drop-zone { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; color: #475569; transition: background 0.2s; }
  #drop-zone.dragover { background: rgba(59,130,246,0.08); color: #3b82f6; }
  .drop-icon { width: 64px; height: 64px; opacity: 0.4; }
  #drop-zone p { font-size: 16px; }
  #drop-zone small { font-size: 13px; color: #334155; }

  #loading { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(15,23,42,0.7); z-index: 10; font-size: 15px; color: #94a3b8; }
</style>
</head>
<body>

<div id="toolbar">
  <h1>🖥️ 檔案檢視器</h1>
  <label id="file-label" for="file-input">📂 選擇檔案</label>
  <input type="file" id="file-input">
  <span id="type-badge"></span>
  <span id="file-name">尚未選擇檔案</span>
  <button id="save-btn" onclick="saveFile()">💾 儲存</button>
  <button id="clear-btn" onclick="clearFile()">✕ 清除</button>
</div>

<div id="preview-area">
  <div id="drop-zone">
    <svg class="drop-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="8" y="4" width="40" height="52" rx="4" stroke="currentColor" stroke-width="3"/>
      <path d="M40 4v12h12" stroke="currentColor" stroke-width="3"/>
      <path d="M20 28h24M20 36h16" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    </svg>
    <p>拖曳檔案到這裡</p>
    <!-- 更新提示文字以包含 PDF -->
    <small>支援 .html .svg .txt .docx .xlsx .pdf 及其他特殊檔案</small>
  </div>
  <div id="loading">⏳ 讀取中...</div>
  <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
  <div id="svg-container"></div>
  
  <!-- 新增 PDF 容器 -->
  <div id="pdf-container"></div>

  <div id="txt-container">
    <div id="txt-toolbar">
      <span id="txt-mode-label">檢視模式</span>
      <button id="txt-edit-toggle" onclick="toggleEdit()">✏️ 編輯</button>
    </div>
    <div id="txt-content" contenteditable="false" spellcheck="false"></div>
  </div>
  <div id="docx-container"><div id="docx-content"></div></div>
  <div id="xlsx-container">
    <div id="sheet-tabs"></div>
    <div id="xlsx-table-wrap"></div>
  </div>
</div>

<script>
  const fileInput    = document.getElementById('file-input');
  const frame        = document.getElementById('preview-frame');
  const svgBox       = document.getElementById('svg-container');
  const pdfBox       = document.getElementById('pdf-container'); // 新增
  const txtBox       = document.getElementById('txt-container');
  const txtContent   = document.getElementById('txt-content');
  const docxBox      = document.getElementById('docx-container');
  const docxContent  = document.getElementById('docx-content');
  const xlsxBox      = document.getElementById('xlsx-container');
  const sheetTabs    = document.getElementById('sheet-tabs');
  const xlsxWrap     = document.getElementById('xlsx-table-wrap');
  const dropZone     = document.getElementById('drop-zone');
  const fileNameEl   = document.getElementById('file-name');
  const clearBtn     = document.getElementById('clear-btn');
  const saveBtn      = document.getElementById('save-btn');
  const badge        = document.getElementById('type-badge');
  const loading      = document.getElementById('loading');
  const modeLabel    = document.getElementById('txt-mode-label');
  const editToggle   = document.getElementById('txt-edit-toggle');

  let xlsxWorkbook = null;
  let currentFileName = '';
  let currentType = '';

  fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

  function getType(name) {
    name = name.toLowerCase();
    if (name.match(/\.html?$/))  return 'html';
    if (name.match(/\.svg$/))    return 'svg';
    if (name.match(/\.txt$/))    return 'txt';
    if (name.match(/\.docx$/))   return 'docx';
    if (name.match(/\.xlsx$/))   return 'xlsx';
    if (name.match(/\.pdf$/))    return 'pdf'; // 新增 PDF 判斷
    return 'special'; 
  }

  function loadFile(file) {
    const type = getType(file.name);
    currentFileName = file.name;
    currentType = type;

    hideAll();
    loading.style.display = 'flex';
    fileNameEl.textContent = file.name;
    clearBtn.style.display = 'inline-block';

    const badgeCfg = {
      html:    ['HTML',    'badge-html'],
      svg:     ['SVG',     'badge-svg'],
      txt:     ['TXT',     'badge-txt'],
      docx:    ['DOCX',    'badge-docx'],
      xlsx:    ['XLSX',    'badge-xlsx'],
      pdf:     ['PDF',     'badge-pdf'], // 新增 PDF 徽章設定
      special: ['特殊檔案', 'badge-special'],
    };
    showBadge(...badgeCfg[type]);

    if (type === 'docx' || type === 'xlsx') {
      const r = new FileReader();
      r.onload = e => {
        loading.style.display = 'none';
        dropZone.style.display = 'none';
        if (type === 'docx') {
          mammoth.convertToHtml({ arrayBuffer: e.target.result })
            .then(res => { docxContent.innerHTML = res.value; docxBox.style.display = 'block'; })
            .catch(() => { docxContent.innerHTML = '<p style="color:red">讀取失敗</p>'; docxBox.style.display = 'block'; });
        } else {
          xlsxWorkbook = XLSX.read(e.target.result, { type: 'array' });
          renderSheetTabs();
          xlsxBox.style.display = 'block';
        }
      };
      r.readAsArrayBuffer(file);
    
    } else if (type === 'pdf') {
      // 新增 PDF 處理邏輯
      const r = new FileReader();
      r.onload = async e => {
        try {
          const typedArray = new Uint8Array(e.target.result);
          const pdf = await pdfjsLib.getDocument(typedArray).promise;
          
          pdfBox.innerHTML = ''; // 清空舊內容
          
          // 迴圈渲染每一頁
          for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
            const page = await pdf.getPage(pageNum);
            const viewport = page.getViewport({ scale: 1.5 }); // 預設縮放比例
            
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            canvas.className = 'pdf-page-canvas';
            
            await page.render({
              canvasContext: context,
              viewport: viewport
            }).promise;
            
            pdfBox.appendChild(canvas);
          }
          
          loading.style.display = 'none';
          dropZone.style.display = 'none';
          pdfBox.style.display = 'flex';
        } catch (err) {
          console.error(err);
          loading.style.display = 'none';
          alert('PDF 讀取失敗');
        }
      };
      r.readAsArrayBuffer(file);

    } else {
      // html, svg, txt, special — 全部以文字讀取
      const r = new FileReader();
      r.onload = e => {
        loading.style.display = 'none';
        dropZone.style.display = 'none';
        const text = e.target.result;

        if (type === 'html') {
          const blob = new Blob([text], { type: 'text/html' });
          frame.src = URL.createObjectURL(blob);
          frame.style.display = 'block';

        } else if (type === 'svg') {
          const parser = new DOMParser();
          const doc = parser.parseFromString(text, 'image/svg+xml');
          const svg = doc.querySelector('svg');
          if (svg) {
            if (!svg.getAttribute('viewBox')) {
              const w = parseFloat(svg.getAttribute('width')) || 800;
              const h = parseFloat(svg.getAttribute('height')) || 600;
              svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
            }
            svg.setAttribute('width', '100%');
            svg.setAttribute('height', '100%');
            svg.style.cssText = 'display:block;width:100%;height:100%;';
            svgBox.appendChild(svg);
          }
          svgBox.style.display = 'block';

        } else {
          // txt & special — editable textarea
          txtContent.textContent = text;
          txtBox.style.display = 'flex';
          saveBtn.style.display = 'inline-block';
          setEditMode(false);
        }
      };
      r.onerror = () => {
        // Binary file that can't be read as text
        loading.style.display = 'none';
        dropZone.style.display = 'none';
        txtContent.textContent = '（此檔案含有二進位內容，無法以文字方式顯示）';
        txtBox.style.display = 'flex';
        saveBtn.style.display = 'none';
        setEditMode(false);
      };
      r.readAsText(file, 'UTF-8');
    }
  }

  /* ── 編輯 / 儲存 ── */
  function toggleEdit() {
    const isEditing = txtContent.contentEditable === 'true';
    setEditMode(!isEditing);
  }

  function setEditMode(on) {
    txtContent.contentEditable = on ? 'true' : 'false';
    modeLabel.textContent = on ? '編輯模式' : '檢視模式';
    editToggle.textContent = on ? '👁 檢視' : '✏️ 編輯';
    editToggle.classList.toggle('active', on);
    if (on) txtContent.focus();
  }

  function saveFile() {
    const text = txtContent.innerText;
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = currentFileName || 'file.txt';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  /* ── XLSX helpers ── */
  function renderSheetTabs() {
    sheetTabs.innerHTML = '';
    xlsxWorkbook.SheetNames.forEach((name, i) => {
      const btn = document.createElement('button');
      btn.className = 'sheet-tab' + (i === 0 ? ' active' : '');
      btn.textContent = name;
      btn.onclick = () => {
        document.querySelectorAll('.sheet-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderSheet(name);
      };
      sheetTabs.appendChild(btn);
    });
    renderSheet(xlsxWorkbook.SheetNames[0]);
  }

  function renderSheet(name) {
    const ws = xlsxWorkbook.Sheets[name];
    const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    if (!data.length) { xlsxWrap.innerHTML = '<p style="color:#64748b;padding:16px">（空白工作表）</p>'; return; }
    const maxCols = Math.max(...data.map(r => r.length));
    let html = '<table><thead><tr><th>#</th>';
    for (let c = 0; c < maxCols; c++) html += `<th>${colName(c)}</th>`;
    html += '</tr></thead><tbody>';
    data.forEach((row, i) => {
      html += `<tr><th>${i + 1}</th>`;
      for (let c = 0; c < maxCols; c++) html += `<td>${esc(String(row[c] ?? ''))}</td>`;
      html += '</tr>';
    });
    html += '</tbody></table>';
    xlsxWrap.innerHTML = html;
  }

  function colName(i) {
    let s = '';
    for (i++; i > 0; i = Math.floor((i-1)/26)) s = String.fromCharCode(((i-1)%26)+65) + s;
    return s;
  }
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  /* ── 清除 ── */
  function hideAll() {
    frame.style.display = 'none'; frame.src = 'about:blank';
    svgBox.style.display = 'none'; svgBox.innerHTML = '';
    pdfBox.style.display = 'none'; pdfBox.innerHTML = ''; // 新增清除 PDF
    txtBox.style.display = 'none'; txtContent.textContent = '';
    docxBox.style.display = 'none'; docxContent.innerHTML = '';
    xlsxBox.style.display = 'none'; sheetTabs.innerHTML = ''; xlsxWrap.innerHTML = '';
    saveBtn.style.display = 'none';
    xlsxWorkbook = null;
  }

  function showBadge(label, cls) {
    badge.textContent = label; badge.className = cls; badge.style.display = 'inline-block';
  }

  function clearFile() {
    hideAll();
    dropZone.style.display = 'flex';
    fileNameEl.textContent = '尚未選擇檔案';
    clearBtn.style.display = 'none';
    badge.style.display = 'none';
    fileInput.value = '';
    currentFileName = '';
    currentType = '';
  }

  /* ── 拖曳 ── */
  const area = document.getElementById('preview-area');
  area.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  area.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  area.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });
</script>
</body>
</html>

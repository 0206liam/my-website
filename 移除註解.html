<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>移除註解工具</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 24px;
  }
  h1 {
    text-align: center;
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 20px;
    color: #f8fafc;
    letter-spacing: 0.5px;
  }
  .lang-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 24px;
  }
  .lang-btn {
    padding: 8px 18px;
    border-radius: 9999px;
    border: 2px solid #334155;
    background: #1e293b;
    color: #94a3b8;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .lang-btn:hover { border-color: #6366f1; color: #a5b4fc; }
  .lang-btn.active {
    background: #6366f1;
    border-color: #6366f1;
    color: #fff;
    box-shadow: 0 0 12px #6366f180;
  }
  .editor-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 700px) {
    .editor-row { grid-template-columns: 1fr; }
  }
  .panel { display: flex; flex-direction: column; gap: 8px; }
  .panel label {
    font-size: 0.8rem;
    font-weight: 600;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  textarea {
    width: 100%;
    height: 340px;
    background: #1e293b;
    color: #e2e8f0;
    border: 1.5px solid #334155;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Fira Mono', 'Consolas', monospace;
    font-size: 0.875rem;
    line-height: 1.6;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: #6366f1; }
  textarea[readonly] { background: #0f172a; color: #a5f3fc; }
  .btn-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 8px 0;
  }
  button.action {
    padding: 10px 28px;
    border-radius: 8px;
    border: none;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  button.run { background: #6366f1; color: #fff; }
  button.run:hover { background: #4f46e5; }
  button.clear { background: #334155; color: #94a3b8; }
  button.clear:hover { background: #475569; color: #e2e8f0; }
  button.copy { background: #0f766e; color: #fff; }
  button.copy:hover { background: #0d9488; }
  .status {
    text-align: center;
    font-size: 0.82rem;
    color: #6366f1;
    min-height: 20px;
    font-weight: 500;
  }
  .hint {
    text-align: center;
    font-size: 0.78rem;
    color: #475569;
    margin-top: 4px;
  }
</style>
</head>
<body>
<h1>🧹 移除程式碼註解</h1>

<div class="lang-grid" id="langGrid"></div>

<div class="btn-row">
  <button class="action run" onclick="removeComments()">▶ 移除註解</button>
  <button class="action clear" onclick="clearAll()">✕ 清除</button>
  <button class="action copy" onclick="copyOutput()">⎘ 複製結果</button>
</div>

<div class="editor-row">
  <div class="panel">
    <label>輸入程式碼</label>
    <textarea id="input" placeholder="在此貼上你的程式碼…"></textarea>
  </div>
  <div class="panel">
    <label>移除後結果</label>
    <textarea id="output" readonly placeholder="結果將顯示在這裡…"></textarea>
  </div>
</div>

<div class="status" id="status"></div>
<div class="hint" id="hint"></div>

<script>
const langs = [
  { id: 'js',     label: 'JavaScript / TypeScript' },
  { id: 'python', label: 'Python' },
  { id: 'html',   label: 'HTML' },
  { id: 'css',    label: 'CSS' },
  { id: 'c',      label: 'C / C++ / Java / C#' },
  { id: 'sql',    label: 'SQL' },
  { id: 'ruby',   label: 'Ruby' },
  { id: 'bash',   label: 'Bash / Shell' },
  { id: 'lua',    label: 'Lua' },
  { id: 'php',    label: 'PHP' },
  { id: 'matlab', label: 'MATLAB / Erlang / LaTeX' },
  { id: 'spice',  label: 'SPICE Netlist' },
];

const hints = {
  js:     '移除 // 單行 和 /* … */ 多行註解（括號內保留）',
  python: '移除 # 單行 和 """ … """ 區塊字串（括號內保留）',
  html:   '移除 <!-- … --> 註解',
  css:    '移除 /* … */ 多行註解（括號內保留）',
  c:      '移除 // 單行 和 /* … */ 多行註解（括號內保留）',
  sql:    '移除 -- 單行 和 /* … */ 多行註解（括號內保留）',
  ruby:   '移除 # 單行 和 =begin … =end 區塊註解（括號內保留）',
  bash:   '移除 # 單行註解，保留 shebang #! 和括號內內容',
  lua:    '移除 -- 單行 和 --[[ … ]] 多行註解（括號內保留）',
  php:    '移除 //, # 單行 和 /* … */ 多行註解（括號內保留）',
  matlab: '移除 % 單行註解（括號內保留）',
  spice:  '移除行首 * 整行註解 和 行內 $ ; 後內容（保留第一行，括號內保留）',
};

let selectedLang = null;

const grid = document.getElementById('langGrid');
langs.forEach(l => {
  const btn = document.createElement('button');
  btn.className = 'lang-btn';
  btn.textContent = l.label;
  btn.dataset.id = l.id;
  btn.onclick = () => selectLang(l.id);
  grid.appendChild(btn);
});

function selectLang(id) {
  selectedLang = id;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.id === id);
  });
  document.getElementById('hint').textContent = hints[id] || '';
  document.getElementById('status').textContent = '';
}

function removeComments() {
  if (!selectedLang) { setStatus('⚠️ 請先選擇程式語言', '#f59e0b'); return; }
  const code = document.getElementById('input').value;
  if (!code.trim()) { setStatus('⚠️ 請輸入程式碼', '#f59e0b'); return; }
  let result;
  try { result = strip(code, selectedLang); }
  catch(e) { setStatus('❌ 處理時發生錯誤', '#f87171'); return; }
  result = result.split('\n').filter(l => l.trim() !== '').join('\n');
  document.getElementById('output').value = result;
  const removed = countLines(code) - countLines(result);
  setStatus('✅ 完成！約移除 ' + removed + ' 行空白/註解', '#34d399');
}

function strip(code, lang) {
  switch (lang) {
    case 'js':     return stripCStyle(code, true);
    case 'c':      return stripCStyle(code, true);
    case 'php':    return stripPHP(code);
    case 'css':    return stripCStyle(code, false);
    case 'html':   return stripHTML(code);
    case 'python': return stripPython(code);
    case 'sql':    return stripSQL(code);
    case 'ruby':   return stripRuby(code);
    case 'bash':   return stripBash(code);
    case 'lua':    return stripLua(code);
    case 'matlab': return stripPercent(code);
    case 'spice':  return stripSpice(code);
    default: return code;
  }
}

// 計算括號深度（共用工具）
function parenDepth(line, upTo) {
  let d = 0;
  for (let i = 0; i < upTo; i++) {
    if (line[i] === '(') d++;
    else if (line[i] === ')') d--;
  }
  return d;
}

// 在一行中找到第一個「不在括號內、不在字串內」的 token 位置
// tokens: array of strings to search for
// returns index or -1
function findCommentOutside(line, tokens, strChars) {
  let depth = 0, inStr = false, strChar = '';
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    // 字串處理
    if (!inStr && strChars && strChars.includes(c)) {
      inStr = true; strChar = c; continue;
    }
    if (inStr) {
      if (c === '\\') { i++; continue; }
      if (c === strChar) inStr = false;
      continue;
    }
    // 括號深度
    if (c === '(') { depth++; continue; }
    if (c === ')') { depth--; continue; }
    if (depth > 0) continue;
    // 比對 token
    for (const tok of tokens) {
      if (line.slice(i, i + tok.length) === tok) return i;
    }
  }
  return -1;
}

function stripCStyle(code, singleLine) {
  let result = '', i = 0;
  while (i < code.length) {
    // 字串
    if (code[i] === '"' || code[i] === "'") {
      const q = code[i]; let j = i + 1;
      while (j < code.length) {
        if (code[j] === '\\') { j += 2; continue; }
        if (code[j] === q) { j++; break; }
        j++;
      }
      result += code.slice(i, j); i = j; continue;
    }
    // template literal
    if (code[i] === '`') {
      let j = i + 1;
      while (j < code.length) {
        if (code[j] === '\\') { j += 2; continue; }
        if (code[j] === '`') { j++; break; }
        j++;
      }
      result += code.slice(i, j); i = j; continue;
    }
    // 括號內跳過
    if (code[i] === '(') {
      let depth = 1, j = i + 1;
      result += code[i];
      while (j < code.length && depth > 0) {
        if (code[j] === '(') depth++;
        else if (code[j] === ')') depth--;
        result += code[j++];
      }
      i = j; continue;
    }
    // block comment
    if (code[i] === '/' && code[i+1] === '*') {
      let j = i + 2;
      while (j < code.length && !(code[j] === '*' && code[j+1] === '/')) j++;
      i = j + 2; continue;
    }
    // line comment
    if (singleLine && code[i] === '/' && code[i+1] === '/') {
      while (i < code.length && code[i] !== '\n') i++;
      continue;
    }
    result += code[i++];
  }
  return result;
}

function stripPHP(code) {
  let result = '', i = 0;
  while (i < code.length) {
    if (code[i] === '"' || code[i] === "'") {
      const q = code[i]; let j = i + 1;
      while (j < code.length) {
        if (code[j] === '\\') { j += 2; continue; }
        if (code[j] === q) { j++; break; }
        j++;
      }
      result += code.slice(i, j); i = j; continue;
    }
    if (code[i] === '(') {
      let depth = 1, j = i + 1;
      result += code[i];
      while (j < code.length && depth > 0) {
        if (code[j] === '(') depth++;
        else if (code[j] === ')') depth--;
        result += code[j++];
      }
      i = j; continue;
    }
    if (code[i] === '/' && code[i+1] === '*') {
      let j = i + 2;
      while (j < code.length && !(code[j] === '*' && code[j+1] === '/')) j++;
      i = j + 2; continue;
    }
    if ((code[i] === '/' && code[i+1] === '/') || code[i] === '#') {
      while (i < code.length && code[i] !== '\n') i++;
      continue;
    }
    result += code[i++];
  }
  return result;
}

function stripHTML(code) {
  // 移除 <!-- --> 註解
  let result = code.replace(/<!--[\s\S]*?-->/g, '');

  // 處理 <script> 區塊內的 JS 註解
  result = result.replace(/(<script[^>]*>)([\s\S]*?)(<\/script>)/gi, (match, open, content, close) => {
    return open + stripCStyle(content, true) + close;
  });

  // 處理 <style> 區塊內的 CSS 註解
  result = result.replace(/(<style[^>]*>)([\s\S]*?)(<\/style>)/gi, (match, open, content, close) => {
    return open + stripCStyle(content, false) + close;
  });

  return result;
}

function stripPython(code) {
  const lines = code.split('\n'), out = [];
  for (const line of lines) {
    let inStr = false, strChar = '', depth = 0, j = 0, newLine = '';
    while (j < line.length) {
      const c = line[j];
      if (!inStr && (c === '"' || c === "'")) {
        if (line.slice(j,j+3) === '"""' || line.slice(j,j+3) === "'''") {
          const q3 = line.slice(j,j+3);
          const found = line.indexOf(q3, j+3);
          if (found >= 0) { newLine += line.slice(j, found+3); j = found+3; continue; }
          else { newLine += line.slice(j); j = line.length; continue; }
        }
        inStr = true; strChar = c; newLine += c; j++; continue;
      }
      if (inStr) {
        newLine += c;
        if (c === '\\') { j++; newLine += line[j]||''; }
        else if (c === strChar) inStr = false;
        j++; continue;
      }
      if (c === '(') { depth++; newLine += c; j++; continue; }
      if (c === ')') { depth--; newLine += c; j++; continue; }
      if (c === '#' && depth === 0) break;
      newLine += c; j++;
    }
    out.push(newLine.trimEnd());
  }
  let joined = out.join('\n');
  joined = joined.replace(/"""[\s\S]*?"""/g, '').replace(/'''[\s\S]*?'''/g, '');
  return joined;
}

function stripSQL(code) {
  let result = stripCStyle(code, false);
  return result.split('\n').map(l => {
    let depth = 0;
    for (let i = 0; i < l.length; i++) {
      if (l[i] === '(') { depth++; continue; }
      if (l[i] === ')') { depth--; continue; }
      if (depth === 0 && l.slice(i, i+2) === '--') return l.slice(0, i).trimEnd();
    }
    return l;
  }).join('\n');
}

function stripRuby(code) {
  let result = code.replace(/^=begin[\s\S]*?^=end/gm, '');
  return result.split('\n').map(l => {
    let inStr = false, strChar = '', depth = 0, out = '';
    for (let i = 0; i < l.length; i++) {
      const c = l[i];
      if (!inStr && (c === '"' || c === "'")) { inStr = true; strChar = c; out += c; continue; }
      if (inStr) { out += c; if (c === strChar) inStr = false; continue; }
      if (c === '(') { depth++; out += c; continue; }
      if (c === ')') { depth--; out += c; continue; }
      if (c === '#' && depth === 0) break;
      out += c;
    }
    return out.trimEnd();
  }).join('\n');
}

function stripBash(code) {
  return code.split('\n').map((l, idx) => {
    if (idx === 0 && l.startsWith('#!')) return l;
    let inStr = false, strChar = '', depth = 0, out = '';
    for (let i = 0; i < l.length; i++) {
      const c = l[i];
      if (!inStr && (c === '"' || c === "'")) { inStr = true; strChar = c; out += c; continue; }
      if (inStr) {
        out += c;
        if (c === '\\') { i++; out += l[i]||''; }
        else if (c === strChar) inStr = false;
        continue;
      }
      if (c === '(') { depth++; out += c; continue; }
      if (c === ')') { depth--; out += c; continue; }
      if (c === '#' && depth === 0) break;
      out += c;
    }
    return out.trimEnd();
  }).join('\n');
}

function stripLua(code) {
  let result = code.replace(/--\[\[[\s\S]*?\]\]/g, '');
  return result.split('\n').map(l => {
    let depth = 0;
    for (let i = 0; i < l.length; i++) {
      if (l[i] === '(') { depth++; continue; }
      if (l[i] === ')') { depth--; continue; }
      if (depth === 0 && l.slice(i, i+2) === '--') return l.slice(0, i).trimEnd();
    }
    return l;
  }).join('\n');
}

function stripPercent(code) {
  return code.split('\n').map(l => {
    let depth = 0;
    for (let i = 0; i < l.length; i++) {
      if (l[i] === '(') { depth++; continue; }
      if (l[i] === ')') { depth--; continue; }
      if (l[i] === '%' && depth === 0) return l.slice(0, i).trimEnd();
    }
    return l;
  }).join('\n');
}

function stripSpice(code) {
  const DOLLAR = String.fromCharCode(36);
  const SEMI = ';';
  return code.split('\n').map((l, idx) => {
    if (idx === 0) return l;
    if (l.trimStart().startsWith('*')) return '';
    if (l.startsWith(DOLLAR)) return '';
    let depth = 0;
    for (let i = 0; i < l.length; i++) {
      if (l[i] === '(') { depth++; continue; }
      if (l[i] === ')') { depth--; continue; }
      if (depth === 0 && (l[i] === DOLLAR || l[i] === SEMI || l[i] === '*')) {
        if (i === 0 || l[i-1] === ' ') return l.slice(0, i).trimEnd();
      }
    }
    return l;
  }).join('\n');
}

function countLines(str) { return str.split('\n').length; }

function clearAll() {
  document.getElementById('input').value = '';
  document.getElementById('output').value = '';
  setStatus('', '');
}

async function copyOutput() {
  const val = document.getElementById('output').value;
  if (!val) { setStatus('⚠️ 沒有可複製的內容', '#f59e0b'); return; }
  try {
    await navigator.clipboard.writeText(val);
    setStatus('✅ 已複製到剪貼簿！', '#34d399');
  } catch {
    setStatus('❌ 複製失敗，請手動複製', '#f87171');
  }
}

function setStatus(msg, color) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.color = color || '#6366f1';
}
</script>
</body>
</html>

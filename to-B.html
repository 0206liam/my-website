<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>量子 AI 決策助手</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        #chat-window { width: 100%; max-width: 400px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        #header { background: #1a73e8; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #msgs { height: 300px; overflow-y: auto; padding: 15px; border-bottom: 1px solid #eee; }
        #input-group { padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #1a73e8; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .login-box { background: white; padding: 20px; border-radius: 10px; text-align: center; }
        #uid-display { font-size: 11px; color: #aaa; text-align: center; padding: 4px; }
    </style>
</head>
<body>

<div id="auth-overlay" class="overlay">
    <div class="login-box">
        <h3>請輸入系統授權碼</h3>
        <p style="font-size: 12px; color: #666;">(請向管理員獲取您的專屬 AI Key)</p>
        <input type="password" id="auth-key" placeholder="輸入授權碼...">
        <button onclick="startApp()">啟動 AI</button>
    </div>
</div>

<div id="chat-window">
    <div id="header">AI人生顧問</div>
    <div id="msgs"></div>
    <div id="uid-display"></div>
    <div id="input-group">
        <input type="text" id="user-input" placeholder="請輸入問題...">
        <button onclick="send()">發送</button>
    </div>
</div>

<script>
    const GIST_ID = "cc37ee46d77d8e0bf8fdb83940a12964";
    let USER_TOKEN = "";
    let USER_UID = "";
    let lastMsgCount = 0;

    window.onload = function() {
        const savedToken = localStorage.getItem('ai_token');
        const savedUid = localStorage.getItem('ai_uid');
        if(savedToken) {
            USER_TOKEN = savedToken;
            USER_UID = savedUid || "";
            document.getElementById('auth-overlay').style.display = 'none';
            if(USER_UID) {
                showUid();
                loadHistory();
            }
        }
    };

    function startApp() {
        const key = document.getElementById('auth-key').value;
        try {
            USER_TOKEN = atob(key.trim());
            if(!USER_TOKEN.startsWith('ghp_')) throw new Error();
            localStorage.setItem('ai_token', USER_TOKEN);
            document.getElementById('auth-overlay').style.display = 'none';
            USER_UID = localStorage.getItem('ai_uid') || "";
            if(USER_UID) {
                showUid();
                loadHistory();
            }
        } catch(e) {
            alert("授權碼錯誤或已過期");
        }
    }

    async function generateUid() {
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: { "Authorization": `token ${USER_TOKEN}` }
            });
            const data = await res.json();
            let chats = JSON.parse(data.files["chats.json"].content || "[]");
            const existingUids = [...new Set(chats.map(c => c.uid).filter(Boolean))];
            const seq = (existingUids.length + 1).toString().padStart(3, '0');
            const rand = Math.floor(1000 + Math.random() * 9000).toString();
            return rand + seq;
        } catch(e) {
            return Math.floor(1000 + Math.random() * 9000).toString() + '001';
        }
    }

    function showUid() {
        document.getElementById('uid-display').textContent = `用戶代號：${USER_UID}`;
    }

    async function loadHistory() {
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: { "Authorization": `token ${USER_TOKEN}` }
            });
            const data = await res.json();
            let chats = JSON.parse(data.files["chats.json"].content || "[]");
            const myChats = chats.filter(c => c.uid === USER_UID);
            
            if(myChats.length === lastMsgCount) return; // 沒有新訊息就不更新
            lastMsgCount = myChats.length;

            const msgs = document.getElementById('msgs');
            msgs.innerHTML = '';
            myChats.forEach(c => appendMsg(c.msg, c.role));
        } catch(e) {
            console.log("載入失敗", e);
        }
    }

    async function send() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if(!text) return;

        appendMsg(text, 'user');
        input.value = "傳送中...";
        input.disabled = true;

        try {
            if(!USER_UID) {
                USER_UID = await generateUid();
                localStorage.setItem('ai_uid', USER_UID);
                showUid();
            }

            const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: { "Authorization": `token ${USER_TOKEN}` }
            });
            const data = await res.json();
            let chats = JSON.parse(data.files["chats.json"].content || "[]");

            chats.push({ uid: USER_UID, msg: text, time: new Date().toLocaleString(), role: 'user' });

            await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: "PATCH",
                headers: { "Authorization": `token ${USER_TOKEN}` },
                body: JSON.stringify({ files: { "chats.json": { content: JSON.stringify(chats) } } })
            });

            lastMsgCount++;
            input.value = "";
            input.disabled = false;
        } catch(e) {
            alert("連線中斷，請重新檢查授權碼");
            localStorage.removeItem('ai_token');
            location.reload();
        }
    }

    function appendMsg(t, r) {
        const d = document.createElement('div');
        d.style.textAlign = r === 'user' ? 'right' : 'left';
        d.innerHTML = `<p style="display:inline-block; padding:8px; background:${r === 'admin' ? '#d0e8ff' : r === 'user' ? '#dcf8c6' : '#eee'}; border-radius:10px;">${t}</p>`;
        const msgs = document.getElementById('msgs');
        msgs.appendChild(d);
        msgs.scrollTop = msgs.scrollHeight;
    }

    // 每5秒輪詢新訊息
    setInterval(() => { if(USER_UID) loadHistory(); }, 5000);

    // Enter 鍵送出
    document.getElementById('user-input').addEventListener('keydown', e => {
        if(e.key === 'Enter') send();
    });
</script>
</body>
</html>

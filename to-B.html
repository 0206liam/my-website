<!DOCTYPE html>
<html lang="zh-TW">
<body>
    <div id="box" style="width:300px; border:1px solid #ccc; padding:10px;">
        <div id="display" style="height:200px; overflow-y:auto;"></div>
        <input type="text" id="msg"><button onclick="send()">發送</button>
    </div>

<script>
    // --- 這裡要手動填入你的資訊，別人才能連上你的雲端 ---
    const CONFIG = {
        token: "你的_GITHUB_TOKEN",
        gistId: "你的_GIST_ID"
    };

    async function send() {
        const text = document.getElementById('msg').value;
        let userId = localStorage.getItem('u_id');

        if (!userId) {
            // 獲取目前用戶數來決定編號
            const res = await fetch(`https://api.github.com/gists/${CONFIG.gistId}`, {
                headers: { "Authorization": `token ${CONFIG.token}` }
            });
            const data = await res.json();
            const chats = JSON.parse(data.files["chats.json"].content || "[]");
            const userCount = [...new Set(chats.map(c => c.id))].length + 1;
            const random4 = Math.floor(1000 + Math.random() * 9000);
            userId = `${random4}${String(userCount).padStart(3, '0')}`;
            localStorage.setItem('u_id', userId);
        }

        const newEntry = {
            id: userId,
            msg: text,
            time: new Date().toLocaleString(),
            role: "user"
        };

        // 上傳雲端邏輯... (需調用 PATCH API)
        // 為了簡潔，此處省略重複的 FETCH PATCH 代碼，邏輯同上
        console.log("傳送至雲端:", newEntry);
        // ...執行 PATCH 更新 Gist...
    }
</script>
</body>
</html>

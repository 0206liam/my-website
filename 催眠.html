<!DOCTYPE html>

<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>無限走廊 - 修正縮放與邊界版</title>

    <style>

        * {

            margin: 0;

            padding: 0;

            overflow: hidden;

        }

        body {

            width: 100vw;

            height: 100vh;

            background: #000;

            display: flex;

            justify-content: center;

            align-items: center;

        }

        canvas {

            display: block;

        }

    </style>

</head>

<body>

    <canvas id="canvas"></canvas>

    <script>

        const canvas = document.getElementById('canvas');

        const ctx = canvas.getContext('2d');

        

        // 宣告全域變數，方便所有函式共用正確的物理解析度尺寸

        let dpr = window.devicePixelRatio || 1;

        let cWidth = window.innerWidth * dpr;

        let cHeight = window.innerHeight * dpr;



        function resize() {

            dpr = window.devicePixelRatio || 1;

            cWidth = window.innerWidth * dpr;

            cHeight = window.innerHeight * dpr;

            

            // 設定 Canvas 實際渲染的物理像素（高清關鍵）

            canvas.width = cWidth;

            canvas.height = cHeight;

            

            // 設定 Canvas 在網頁上的顯示 CSS 尺寸

            canvas.style.width = window.innerWidth + 'px';

            canvas.style.height = window.innerHeight + 'px';

            

            // 移除原本的 ctx.scale(dpr, dpr)，改由投影函式直接計算物理座標



            if (time > 0) {

                renderFrame();

            }

        }

        window.addEventListener('resize', resize);

        

        // 鏡頭參數

        const camera = {

            x: 0,

            y: 60, 

            z: 0,

            fov: 80 

        };

        

        const speed = 11;

        let time = 0;

        const renderDistance = 5000; 

        

        // 【修正 1】投影函式改用 cWidth / cHeight (物理像素) 來計算

        function project(point3D) {

            const relX = point3D.x - camera.x;

            const relY = point3D.y - camera.y;

            const relZ = point3D.z - camera.z;

            

            if (relZ <= 5) return null; 

            

            // 使用變更後的 cHeight 與 cWidth

            const scale = (cHeight / 2) / Math.tan((camera.fov * Math.PI) / 360);

            const screenX = cWidth / 2 + (relX / relZ) * scale;

            const screenY = cHeight / 2 - (relY / relZ) * scale;

            

            return { x: screenX, y: screenY, z: relZ };

        }

        

        function generateSegments(startZ, endZ) {

            const w = 250;  

            const h = 200;  

            const segmentLength = 150; 

            

            const polygons = [];

            const startSegment = Math.floor(startZ / segmentLength);

            const endSegment = Math.floor(endZ / segmentLength) + 1;

            

            for (let i = startSegment; i <= endSegment; i++) {

                const z1 = i * segmentLength;

                const z2 = (i + 1) * segmentLength;

                

                // 地板

                polygons.push({

                    type: 'floor', color: 'gradient', z1: z1, z2: z2,

                    points: [{x: -w, y: -h, z: z1}, {x: w, y: -h, z: z1}, {x: w, y: -h, z: z2}, {x: -w, y: -h, z: z2}]

                });

                

                // 天花板

                polygons.push({

                    type: 'ceiling', color: '#777777',

                    points: [{x: -w, y: h, z: z1}, {x: w, y: h, z: z1}, {x: w, y: h, z: z2}, {x: -w, y: h, z: z2}]

                });

                

                // 左牆

                polygons.push({

                    type: 'wall-left', color: 'gradient',

                    points: [{x: -w, y: -h, z: z1}, {x: -w, y: h, z: z1}, {x: -w, y: h, z: z2}, {x: -w, y: -h, z: z2}]

                });

                

                // 右牆

                polygons.push({

                    type: 'wall-right', color: 'gradient',

                    points: [{x: w, y: -h, z: z1}, {x: w, y: h, z: z1}, {x: w, y: h, z: z2}, {x: w, y: -h, z: z2}]

                });

                

                // 天花板日光燈

                if (i % 2 === 0) {

                    const lw = 35; 

                    const ll = 90; 

                    polygons.push({

                        type: 'light', color: '#ffffff',

                        points: [

                            { x: -lw, y: h - 2, z: z1 + 30 },

                            { x: lw, y: h - 2, z: z1 + 30 },

                            { x: lw, y: h - 2, z: z1 + 30 + ll },

                            { x: -lw, y: h - 2, z: z1 + 30 + ll }

                        ]

                    });

                }



                // 牆面裝飾線條

                polygons.push({

                    type: 'line', color: '#6e6e66',

                    points: [{x: -w+1, y: 0, z: z1}, {x: -w+1, y: 15, z: z1}, {x: -w+1, y: 15, z: z2}, {x: -w+1, y: 0, z: z2}]

                });

                polygons.push({

                    type: 'line', color: '#6e6e66',

                    points: [{x: w-1, y: 0, z: z1}, {x: w-1, y: 15, z: z1}, {x: w-1, y: 15, z: z2}, {x: w-1, y: 0, z: z2}]

                });

            }

            return polygons;

        }

        

        function getPolygonDepth(polygon) {

            let avgZ = 0;

            polygon.points.forEach(p => { avgZ += p.z - camera.z; });

            return avgZ / polygon.points.length;

        }

        

        function drawPolygon(polygon, depth) {

            const projectedPoints = polygon.points.map(project);

            if (projectedPoints.some(p => p === null)) return;

            

            // 【修正 2】模糊濾鏡（blur）大小也要跟著 dpr 縮放，否則高解析度下模糊會變得很不明顯

            let blurAmount = 0;

            if (depth > 600) {

                blurAmount = Math.min((depth - 600) / 300, 8) * dpr; 

            }

            ctx.filter = blurAmount > 0 ? `blur(${blurAmount}px)` : 'none';



            ctx.beginPath();

            ctx.moveTo(projectedPoints[0].x, projectedPoints[0].y);

            for (let i = 1; i < projectedPoints.length; i++) {

                ctx.lineTo(projectedPoints[i].x, projectedPoints[i].y);

            }

            ctx.closePath();

            

            let fog = Math.min(Math.max(depth / renderDistance, 0), 1);

            fog = Math.pow(fog, 2.5); 

            

            if (polygon.type === 'light') {

                ctx.shadowBlur = Math.max(0, 20 * (1 - fog)) * dpr; // 陰影大小乘上 dpr

                ctx.shadowColor = '#ffffa0';

                ctx.fillStyle = `rgba(255, 255, 230, ${1 - fog * 0.3})`;

                ctx.fill();

            } else {

                ctx.shadowBlur = 0;



                if (polygon.type === 'floor') {

                    const leftX = Math.min(projectedPoints[0].x, projectedPoints[3].x);

                    const rightX = Math.max(projectedPoints[1].x, projectedPoints[2].x);

                    

                    const grad = ctx.createLinearGradient(leftX, 0, rightX, 0);

                    grad.addColorStop(0, '#535349');   

                    grad.addColorStop(0.5, '#7b7b6c'); 

                    grad.addColorStop(1, '#535349');

                    ctx.fillStyle = grad;

                    ctx.fill();



                    ctx.strokeStyle = '#44443c'; 

                    ctx.lineWidth = Math.max(1.1, 600 / depth) * dpr; // 線條粗細乘上 dpr

                    

                    const w = 250; const h = -200;

                    const z1 = polygon.z1; const z2 = polygon.z2;



                    for (let j = 1; j <= 3; j++) {

                        const tileX = -w + (w * 2 / 4) * j;

                        const pStart = project({ x: tileX, y: h, z: z1 });

                        const pEnd = project({ x: tileX, y: h, z: z2 });

                        if (pStart && pEnd) { ctx.beginPath(); ctx.moveTo(pStart.x, pStart.y); ctx.lineTo(pEnd.x, pEnd.y); ctx.stroke(); }

                    }

                    for (let j = 0; j <= 3; j++) {

                        const tileZ = z1 + (150 / 3) * j;

                        const pLeft = project({ x: -w, y: h, z: tileZ });

                        const pRight = project({ x: w, y: h, z: tileZ });

                        if (pLeft && pRight) { ctx.beginPath(); ctx.moveTo(pLeft.x, pLeft.y); ctx.lineTo(pRight.x, pRight.y); ctx.stroke(); }

                    }



                } else if (polygon.type === 'wall-left' || polygon.type === 'wall-right') {

                    const topY = Math.min(projectedPoints[1].y, projectedPoints[2].y);

                    const bottomY = Math.max(projectedPoints[0].y, projectedPoints[3].y);

                    const wallHeight = bottomY - topY;



                    const wallGrad = ctx.createLinearGradient(0, topY - wallHeight * 0.4, 0, bottomY + wallHeight * 0.4);

                    

                    if (polygon.type === 'wall-left') {

                        wallGrad.addColorStop(0, '#a3a398');    

                        wallGrad.addColorStop(1, '#4e4e46');    

                    } else {

                        wallGrad.addColorStop(0, '#9e9e93');    

                        wallGrad.addColorStop(1, '#4b4b43');    

                    }

                    

                    ctx.fillStyle = wallGrad;

                    ctx.fill();



                    ctx.strokeStyle = '#65655d'; 

                    ctx.lineWidth = Math.max(1.6, 1600 / depth) * dpr; 

                    

                    ctx.beginPath();

                    ctx.moveTo(projectedPoints[0].x, projectedPoints[0].y);

                    ctx.lineTo(projectedPoints[1].x, projectedPoints[1].y);

                    ctx.stroke();



                } else {

                    ctx.fillStyle = polygon.color;

                    ctx.fill();

                }

                

                if (polygon.type === 'line') {

                    ctx.strokeStyle = '#65655d'; 

                    ctx.lineWidth = Math.max(1.1, 600 / depth) * dpr; 

                    ctx.stroke();

                } else if (polygon.type === 'ceiling') {

                    ctx.strokeStyle = '#65655d'; 

                    ctx.lineWidth = Math.max(1.2, 1200 / depth) * dpr; 

                    ctx.stroke();

                }

                

                ctx.fillStyle = `rgba(0, 0, 0, ${fog})`;

                ctx.fill();

                

                if (polygon.type === 'line' || polygon.type === 'floor' || polygon.type === 'wall-left' || polygon.type === 'wall-right' || polygon.type === 'ceiling') {

                    ctx.strokeStyle = `rgba(0, 0, 0, ${fog})`;

                    ctx.stroke();

                }

            }

        }



        function renderFrame() {

            ctx.fillStyle = '#000000';

            ctx.filter = 'none';

            // 【修正 3】背景清除改用物理尺寸 cWidth, cHeight，確保完美填滿

            ctx.fillRect(0, 0, cWidth, cHeight);

            

            const activePolygons = generateSegments(camera.z - 150, camera.z + renderDistance);

            

            const sorted = activePolygons.map(p => ({

                poly: p,

                depth: getPolygonDepth(p)

            }))

            .filter(item => item.depth > 0)

            .sort((a, b) => b.depth - a.depth);

            

            sorted.forEach(item => {

                drawPolygon(item.poly, item.depth);

            });

            

            // ==========================================

            // 【修正 4】暗角 (Vignette) 改用物理像素尺寸計算

            // ==========================================

            ctx.shadowBlur = 0;

            ctx.filter = 'none'; 

            

            const centerX = cWidth / 2;

            const centerY = cHeight / 2;

            

            const radius = Math.sqrt(centerX * centerX + centerY * centerY);

            

            const vignetteGrad = ctx.createRadialGradient(centerX, centerY, radius * 0.2, centerX, centerY, radius);

            vignetteGrad.addColorStop(0, 'rgba(0, 0, 0, 0)');     

            vignetteGrad.addColorStop(0.5, 'rgba(0, 0, 0, 0.3)'); 

            vignetteGrad.addColorStop(1, 'rgba(0, 0, 0, 0.7)');  



            ctx.fillStyle = vignetteGrad;

            ctx.fillRect(0, 0, cWidth, cHeight); // 確保暗角完美覆蓋邊界

            // ==========================================

        }

        

        function animate() {

            time += 1;

            camera.z += speed;

            

            const walkSpeed = 0.11; 

            camera.y = 60 + Math.abs(Math.sin(time * walkSpeed)) * -20; 

            camera.x = Math.cos(time * walkSpeed) * 9;                

            

            renderFrame();

            

            requestAnimationFrame(animate);

        }

        

        // 初始化先執行一次 resize 以確保初始畫布大小正確

        resize();

        animate();

    </script>

</body>

</html>
